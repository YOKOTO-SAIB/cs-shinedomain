<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>YOKO CS — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="chat.css">
<style>
#user-pg{position:fixed;inset:0;display:flex;flex-direction:column;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
<div id="user-pg" style="display:flex;flex-direction:column;">

  <!-- Header CS -->
  <div class="cs-hdr">
    <img id="u-cs-av" class="cs-hdr-av" src="" alt="CS">
    <div class="cs-hdr-info">
      <div id="u-cs-name" class="cs-hdr-name">Customer Service</div>
      <div id="u-cs-store" class="cs-hdr-store">YOKO STORE</div>
      <div class="cs-hdr-status"><div class="sdot pulse"></div><span>Online</span></div>
    </div>
    <div class="hdr-acts">
      <button class="ibtn" onclick="showMyProf()" title="Profil"><i class="fa fa-user"></i></button>
      <button class="ibtn" onclick="logout()" title="Logout"><i class="fa fa-right-from-bracket"></i></button>
    </div>
  </div>

  <!-- Messages -->
  <div class="msg-area" id="u-msgs"></div>

  <!-- Input -->
  <div class="inp-area">
    <div id="u-uprog" class="uprog" style="display:none">
      <div class="uprog-lbl" id="u-uprog-lbl">Mengupload...</div>
      <div class="uprog-bg"><div class="uprog-bar" id="u-uprog-bar" style="width:0%"></div></div>
    </div>
    <div id="u-rep-prev" class="reply-prev" style="display:none">
      <div><div class="rp-nm"></div><div class="rp-tx"></div></div>
      <button class="rp-x" onclick="cancelRep('user')">✕</button>
    </div>
    <div class="inp-row">
      <div class="att-wrap">
        <button class="att-btn" onclick="togAtt('u-att',event)"><i class="fa fa-paperclip"></i></button>
        <div class="att-menu" id="u-att" style="display:none">
          <div class="att-row" onclick="pickF('image/*')"><i class="fa fa-image" style="color:var(--accent)"></i> Foto / Gambar</div>
          <div class="att-row" onclick="pickF('video/*')"><i class="fa fa-video" style="color:var(--accent2)"></i> Video</div>
          <div class="att-row" onclick="pickF('audio/*')"><i class="fa fa-music" style="color:#f472b6"></i> Musik / Audio</div>
          <div class="att-row" onclick="pickF('*/*')"><i class="fa fa-file" style="color:var(--green)"></i> File / Dokumen</div>
        </div>
      </div>
      <textarea class="msg-inp" id="u-msg-inp" placeholder="Pesan ke CS..." rows="1" onkeydown="uKey(event)" oninput="ar(this)"></textarea>
      <button class="send-btn" onclick="uSend()"><i class="fa fa-paper-plane"></i></button>
    </div>
    <input type="file" id="u-file" style="display:none" onchange="uFile(event)">
  </div>
</div>

<!-- Profile sheet -->
<div class="overlay center" id="u-prof-sheet" style="display:none">
  <div class="sheet center-sheet" style="max-width:320px;text-align:center">
    <img id="up-av" style="width:72px;height:72px;border-radius:18px;object-fit:cover;border:2.5px solid var(--accent);display:block;margin:0 auto 10px" src="" alt="">
    <div id="up-name" style="font-size:18px;font-weight:800"></div>
    <div id="up-email" style="font-size:12px;color:var(--text2);margin-top:3px"></div>
    <div id="up-uid" style="font-size:10px;color:var(--text3);margin-top:5px;word-break:break-all;padding:0 10px"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:18px">
      <button class="btn btn-sm btn-red" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
      <button class="btn btn-sm btn-out" onclick="closeSheet('u-prof-sheet')">Tutup</button>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="messages.js"></script>
<script>
(function(){
window.initUser=async function(){
  const db=window.App.db,u=window.App.user;
  if(!db||!u)return;
  const ban=(await db.ref('users/'+u.uid+'/banned').once('value')).val();
  if(ban){
    document.getElementById('user-pg').innerHTML=`<div class="banned-scr"><div style="font-size:60px">🚫</div><div style="font-size:20px;font-weight:900;color:var(--red)">Akun Dibanned</div><div style="font-size:13px;color:var(--text2);max-width:260px;line-height:1.6;text-align:center">Akunmu dibanned oleh admin. Hubungi kami via saluran lain jika ini kesalahan.</div><button class="btn btn-sm btn-out" onclick="logout()" style="margin-top:8px"><i class="fa fa-right-from-bracket"></i> Logout</button></div>`;
    return;
  }
  const cs=(await db.ref('cs_settings').once('value')).val()||{};
  document.getElementById('u-cs-av').src=cs.avatar||genAv('CS');
  document.getElementById('u-cs-name').textContent=cs.name||'Customer Service';
  document.getElementById('u-cs-store').textContent=cs.storeName||'YOKO STORE';
  await db.ref('chats/'+u.uid+'/userInfo').set({name:u.displayName,email:u.email,photoURL:u.photoURL||''});
  const wc=(await db.ref('chats/'+u.uid+'/welcomed').once('value')).val();
  if(!wc&&cs.welcome){
    await db.ref('chats/'+u.uid+'/messages').push({type:'text',text:cs.welcome,uid:'__cs__',name:cs.name||'CS',photoURL:cs.avatar||'',from:'cs',timestamp:Date.now(),read:true});
    await db.ref('chats/'+u.uid).update({welcomed:true});
  }
  startListen();
};
function startListen(){
  const db=window.App.db,u=window.App.user;
  const cont=document.getElementById('u-msgs');
  db.ref('chats/'+u.uid+'/messages').on('child_added',snap=>{
    const msg=snap.val();msg.id=snap.key;
    appendMsg(msg,cont,u.uid,u.uid);scrollEnd(cont);
    if(msg.from==='cs')db.ref('chats/'+u.uid+'/messages/'+snap.key+'/read').set(true);
  });
  db.ref('chats/'+u.uid+'/messages').on('child_changed',snap=>{const m=snap.val();m.id=snap.key;updateMsg(m,cont,u.uid,u.uid);});
  db.ref('chats/'+u.uid+'/messages').on('child_removed',snap=>rmMsg(snap.key));
}
window.uSend=async function(){
  const db=window.App.db,u=window.App.user;
  const box=document.getElementById('u-msg-inp'),text=box.value.trim();
  if(!text)return;
  if((await db.ref('users/'+u.uid+'/banned').once('value')).val()){toast('Akun dibanned!','ter');return;}
  box.value='';ar(box);
  const msg={type:'text',text,uid:u.uid,name:u.displayName,photoURL:u.photoURL||'',from:'user',timestamp:Date.now(),read:false};
  const rep=window._rep.user;
  if(rep){msg.replyTo={id:rep.id,name:rep.name,text:rep.text||'[media]'};cancelRep('user');}
  await db.ref('chats/'+u.uid+'/messages').push(msg);
  await db.ref('chats/'+u.uid).update({lastMsg:text,lastTime:Date.now(),unread:firebase.database.ServerValue.increment(1)});
  scrollEnd('u-msgs');
};
window.uKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();uSend();}};
window.pickF=function(accept){const f=document.getElementById('u-file');f.accept=accept;f.click();hideAtts();};
window.uFile=async function(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  const db=window.App.db,u=window.App.user;
  const prog=document.getElementById('u-uprog'),bar=document.getElementById('u-uprog-bar'),lbl=document.getElementById('u-uprog-lbl');
  prog.style.display='block';lbl.textContent='Mengupload '+file.name+'...';
  try{
    const r=await upImgBB(file,p=>bar.style.width=p+'%');
    const msg={type:dType(file),url:r.url,uid:u.uid,name:u.displayName,photoURL:u.photoURL||'',from:'user',filename:file.name,size:fmtSize(file.size),timestamp:Date.now(),read:false};
    const rep=window._rep.user;if(rep){msg.replyTo={id:rep.id,name:rep.name,text:rep.text||'[media]'};cancelRep('user');}
    await db.ref('chats/'+u.uid+'/messages').push(msg);
    await db.ref('chats/'+u.uid).update({lastMsg:'['+msg.type+'] '+file.name,lastTime:Date.now(),unread:firebase.database.ServerValue.increment(1)});
    toast('Terkirim!','tok');scrollEnd('u-msgs');
  }catch(err){toast('Upload gagal: '+err.message,'ter');}
  prog.style.display='none';bar.style.width='0%';
};
window.showMyProf=function(){
  const u=window.App.user;
  document.getElementById('up-av').src=u.photoURL||genAv(u.displayName);
  document.getElementById('up-name').textContent=u.displayName;
  document.getElementById('up-email').textContent=u.email;
  document.getElementById('up-uid').textContent='UID: '+u.uid;
  openSheet('u-prof-sheet');
};
window.addEventListener('load',()=>{if(!window.App?.db){window.location.href='/';return;}window.initUser&&window.initUser();});
})();
</script>
</body>
</html>
